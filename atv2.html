<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <title>SIWD - Sistema Integrado de Web Design</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            background-image: url("fundo.png");
            background-size: cover;
            background-position: center;
            backdrop-filter: blur(2px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 80px;   
            padding-bottom: 60px; 
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #1b1b1b;
            color: white;
            padding: 15px 30px;
            z-index: 1000;
        }

        header h1 {
            margin: 0;
            font-size: 18px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .titulo {
            position: static;
            text-align: center;
            font-size: 30px;
        }

        .titulo h2 {
            margin: 0;
        }

        .container {
            background: #f1f1f1;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            border: 2px solid black;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
            transition: 0.2s;
            box-sizing: border-box;
        }

        button {
            width: 60%;
            padding: 12px;
            background: #303030;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
        }

        button:hover {
            background: #636363;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1b1b1b;
            color: white;
            text-align: center;
            font-size: 14px;
            padding: 12px 0;
            z-index: 1000;
        }

        footer p {
            margin: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1><strong>IA - SIWD -</strong> Sistema Integrado de Web Design</h1>
    </header>

    <main>
        <div class="titulo">
            <h2><strong>Cadastro</strong></h2>
        </div>

        <div class="container">
            <form method="get">
                <div>
                    <label for="inp-matricula">Número de Matricula</label>
                    <input type="number" name="Matricula" id="inp-matricula" required min="0" step="1">
                </div>

                <div>
                    <label for="inp-nomecompleto">Nome Completo</label>
                    <input type="text" name="nomecompleto" id="inp-nomecompleto" required>
                </div>

                <div>
                    <label for="inp-senha">Senha</label>
                    <input type="password" name="senha" id="inp-senha" required>
                </div>

                <div>
                    <label for="inp-confirmarsenha">Confirmar Senha</label>
                    <input type="password" name="confirmarsenha" id="inp-confirmarsenha" required>
                </div>

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 SIWD - Sistema Integrado de Web Design</p>
    </footer>
</body>
</html>
