<!DOCTYPE html>
<html lang='pt-BR'>

<head>
    <meta charset='utf-8'>
    <title> SIWD - Sistema Integrado de Web Design</title>
    <style>
body {
    margin: 0;
    font-family: Arial;
    background-image: url("fundo.png");
    background-size: cover;        
    background-position: center;
    backdrop-filter: blur(2px);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: #1b1b1b;
            color: white;
            text-align: left;
            padding-left: 15px;
            font-size: 18px;
        }

        .container {
            background: #f1f1f1;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            border: 2px solid black;
        }

        .titulo {
            position: absolute;
            top: 20%;
            text-align: center;
        }

        input {
            width: 100%;
            margin-left: -8px;
            padding: 8px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
            transition: 0.2s;
        }

        button {
            width: 60%;
            padding: 12px;
            background: #303030;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
        }

        button:hover {
            background: #636363;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>
    
    <header>
        <h1><strong>IA - SIWD -</strong> Sistema Integrado de Web Design</h1>
    </header>

    <div class="titulo">
        <h2>Cadastro</h2>
    </div>
    <div class="container">
<form method="get">
    <div>
        <label for="inp-matricula">Número de Matricula</label>
        <input type="number" name="Matricula" id="inp-matricula" required min="0" step="1">
    </div>

    <div>
        <label for="inp-nomecompleto">Nome Completo</label>
        <input type="text" name="nomecompleto" id="inp-nomecompleto" required>
    </div>

    <div>
        <label for="inp-senha">Senha</label>
        <input type="password" name="senha" id="inp-senha" required>
    </div>

    <div>
        <label for="inp-confirmarsenha">Confirmar Senha</label>
        <input type="password" name="confirmarsenha" id="inp-confirmarsenha" required>
    </div>

    <button type="submit">Cadastrar</button>
</form>
    </div>
</body>

</html>
