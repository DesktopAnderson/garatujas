<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>SIWD - Sistema Integrado de Web Design</title>
    <link rel="icon" href="imgs/favicon-light.png" media="(prefers-color-scheme: light)">
    <link rel="icon" href="imgs/favicon-dark.png" media="(prefers-color-scheme: dark)">
    <link rel="icon" href="imgs/favicon-fallback.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1><strong>IA - SIWD -</strong> Sistema Integrado de Web Design</h1>
    </header>

    <main>
        <div class="titulo">
            <h2><strong>Cadastro</strong></h2>
        </div>

        <div class="container">
            <form method="get">
                <div>
                    <label for="inp-matricula">Número de Matricula</label>
                    <input type="number" name="Matricula" id="inp-matricula" required min="0" step="1">
                </div>

                <div>
                    <label for="inp-nomecompleto">Nome Completo</label>
                    <input type="text" name="nomecompleto" id="inp-nomecompleto" required>
                </div>

                <div>
                    <label for="inp-senha">Senha</label>
                    <input type="password" name="senha" id="inp-senha" required>
                </div>

                <div>
                    <label for="inp-confirmarsenha">Confirmar Senha</label>
                    <input type="password" name="confirmarsenha" id="inp-confirmarsenha" required>
                </div>
                <div class="termos-container">
                    <label class="switch">
                        <input type="checkbox" name="termos" id="slider-termos" required>
                        <span class="slider"></span>
                    </label>

                    <span class="termos-texto">
                        Eu li e aceito os
                        <a href="termos.html" target="_blank">Termos de uso</a>
                    </span>
                </div>
                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 SIWD - Sistema Integrado de Web Design</p>
    </footer>
</body>

</html>
